<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Carta para Yuli</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --card-width: 760px;
      --card-padding: 34px;
      --card-radius: 20px;
      --bg1: #ffd1dc;
      --bg2: #f7d6ff;
      --bg3: #d7f0ff;
    }

    *{box-sizing:border-box}
    html,body{
      height:100%;
      margin:0;
      font-family: "Georgia", "Times New Roman", serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background: linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
      background-size: 400% 400%;
      animation: bgShift 18s ease infinite;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      color:#3b2b2b;
    }

    @keyframes bgShift{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .stage{
      width:100%;
      max-width:calc(var(--card-width) + 120px);
      padding:20px;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    h1{
      margin:0;
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      font-size:28px;
      letter-spacing:1px;
      color:#6b2b3a;
      text-shadow:0 1px 0 rgba(255,255,255,0.6);
    }

    .carta {
      width:100%;
      max-width:var(--card-width);
      padding:var(--card-padding);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,250,250,0.95));
      border-radius:var(--card-radius);
      box-shadow: 0 12px 30px rgba(80,40,60,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
      font-size:18px;
      line-height:1.6;
      color:#3b2b2b;
      white-space:pre-wrap;
      transform-origin:center;
      opacity:0;
      transform: translateY(18px) scale(0.98);
      position:relative;
      z-index:2;
    }

    .firma{
      margin-top:18px;
      font-weight:700;
      color:#7a2b3f;
      font-size:18px;
    }

    .sello {
      position:absolute;
      right: -18px;
      top: -18px;
      width:120px;
      height:120px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), rgba(255,255,255,0.05)),
                  linear-gradient(135deg, rgba(255,200,220,0.9), rgba(255,150,180,0.85));
      box-shadow: 0 8px 20px rgba(120,40,70,0.12);
      display:flex;
      align-items:center;
      justify-content:center;
      transform: rotate(-12deg);
      z-index:1;
      pointer-events:none;
    }
    .sello span{font-size:28px; transform:translateY(2px)}

    .float {
      position:absolute;
      pointer-events:none;
      font-size:28px;
      will-change:transform,opacity;
      z-index:0;
      text-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    @media (max-width:820px){
      .carta{font-size:16px; padding:22px}
      .sello{display:none}
    }
  </style>
</head>
<body>
  <div class="stage">
    <h1>Una carta para <strong>Yuli</strong></h1>

    <div class="carta" id="carta" aria-live="polite"></div>

    <div class="sello" aria-hidden="true"><span>💖</span></div>
  </div>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // Texto completo de la carta (más extenso y romántico)
    const texto = `Querida Yuli,

Desde el primer instante en que te vi, supe que había encontrado algo único.
Tu risa tiene la magia de convertir los días grises en amaneceres,
y tu mirada guarda la calma que mi corazón siempre buscó.

Eres la rosa que perfuma mis pensamientos,
la melodía que acompaña mis pasos, y la luz que guía mis sueños.
Contigo aprendí que los pequeños detalles son los que hacen grande el amor:
una palabra a tiempo, una caricia inesperada, una promesa susurrada.

Quiero caminar a tu lado en tardes de lluvia y en mañanas de sol,
descubrir contigo nuevos lugares, reír hasta que nos duela el estómago,
y construir recuerdos que se vuelvan historias para contar.

Gracias por ser mi refugio y mi aventura al mismo tiempo.
Gracias por cada gesto, por cada silencio compartido, por cada abrazo.
Te llevo en mi pensamiento y en mi pecho, hoy y siempre.

Con todo mi amor y ternura,
José 💖`;

    const cartaEl = document.getElementById('carta');

    // **Velocidad fija** en ms por carácter (una sola velocidad para todo el texto)
    const VELOCIDAD_MS = 120;

    // función de escritura automática (respetando saltos de línea)
    function escribirTexto(textoCompleto, velocidadMs, onComplete){
      cartaEl.textContent = "";
      let i = 0;
      if (window._intervaloEscritura) clearInterval(window._intervaloEscritura);

      window._intervaloEscritura = setInterval(() => {
        cartaEl.textContent += textoCompleto[i] || '';
        i++;
        if (i >= textoCompleto.length){
          clearInterval(window._intervaloEscritura);
          window._intervaloEscritura = null;
          if (typeof onComplete === 'function') onComplete();
        }
      }, velocidadMs);
    }

    // animación de entrada de la carta con GSAP
    function animarCartaEntrada(){
      gsap.fromTo(cartaEl,
        {opacity:0, y:18, scale:0.98},
        {opacity:1, y:0, scale:1, duration:1.2, ease:"back.out(1.6)"}
      );
    }

    // crear elementos flotantes (corazones, rosas, flores)
    const simbolos = ["❤️","🌹","🌸","💐","💞"];
    let flotantesInterval = null;

    function lanzarElemento(){
      const el = document.createElement('div');
      el.className = 'float';
      el.textContent = simbolos[Math.floor(Math.random()*simbolos.length)];
      document.body.appendChild(el);

      const startX = Math.random() * window.innerWidth;
      const startY = window.innerHeight + 40;
      const scale = 0.6 + Math.random() * 1.4;
      const rotation = (Math.random() - 0.5) * 60;

      gsap.set(el, {x: startX, y: startY, scale: scale, rotation: rotation, opacity: 0.95});

      const duration = 6 + Math.random() * 4;
      gsap.to(el, {
        y: -120,
        x: startX + (Math.random() - 0.5) * 160,
        rotation: rotation + (Math.random() - 0.5) * 120,
        opacity: 0,
        ease: "power1.out",
        duration: duration,
        onComplete: () => el.remove()
      });
    }

    function iniciarFlotantes(){
      if (flotantesInterval) clearInterval(flotantesInterval);
      flotantesInterval = setInterval(lanzarElemento, 700);
    }
    function detenerFlotantes(){
      if (flotantesInterval) clearInterval(flotantesInterval);
      flotantesInterval = null;
    }

    // reproducir todo: animación carta + escritura + flotantes
    function reproducirCarta(){
      if (window._intervaloEscritura) clearInterval(window._intervaloEscritura);
      cartaEl.textContent = "";
      animarCartaEntrada();
      iniciarFlotantes();
      escribirTexto(texto, VELOCIDAD_MS, () => {
        setTimeout(detenerFlotantes, 2200);
      });
    }

    // iniciar al cargar
    window.addEventListener('load', () => {
      animarCartaEntrada();
      setTimeout(() => reproducirCarta(), 700);
    });
  </script>
</body>
</html>
